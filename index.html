<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Ultah Khalid - Roblox Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --roblox-red: #E2231A;
            --roblox-blue: #00A2FF;
            --roblox-dark: #232527;
            --roblox-light: #FFFFFF;
            --roblox-grey: #ADB5BD;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            /* Ganti 'LINK_FOTO_BACKGROUND' di bawah dengan URL Raw gambar background Anda */
            background: linear-gradient(rgba(0, 116, 189, 0.4), rgba(0, 92, 148, 0.5)), url('https://raw.githubusercontent.com/jihadsaputra17/undangan-ultah/main/azzam1.png');
            background-size: cover, contain;
            background-repeat: no-repeat;
            background-position: center, right;
            background-attachment: fixed;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        .container {
            padding: 20px;
            max-width: 600px;
            margin: auto;
        }

        h1 {
            font-family: 'Bungee', cursive;
            color: var(--roblox-red);
            font-size: 2.5rem;
            margin-bottom: 0;
            text-shadow: 3px 3px 0px white;
        }

        .subtitle {
            font-size: 1.2rem;
            margin-top: 10px;
            color: var(--roblox-grey);
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border: 6px solid white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 15px;
            box-shadow: 0px 10px 0px rgba(0,0,0,0.2);
            color: #333;
        }

        .btn-play {
            background-color: #00B06F; /* Roblox Play Button Green */
            color: white;
            padding: 15px 40px;
            font-family: 'Bungee', cursive;
            font-size: 1.5rem;
            text-decoration: none;
            display: inline-block;
            border-bottom: 5px solid #008453;
            margin-top: 20px;
            transition: 0.2s;
        }

        .btn-play:active {
            margin-top: 23px;
            border-bottom: 2px solid #008453;
        }

        .event-info {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--roblox-dark);
        }

        .ramadan-tag {
            background: #FFD700;
            color: black;
            padding: 8px 20px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        /* Simple Balloon Animation */
        .balloon {
            position: fixed;
            bottom: -100px;
            width: 30px;
            height: 40px;
            background: var(--roblox-red);
            border-radius: 5px; /* Blocky balloon */
            opacity: 0.7;
            animation: float 5s infinite ease-in;
            z-index: -1;
        }

        .profile-pic {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.3);
            margin: 10px auto 20px auto;
            border-radius: 10px;
            display: block;
        }

        @keyframes float {
            to { transform: translateY(-110vh) rotate(360deg); }
        }

        .header-banner {
            background: var(--roblox-red);
            padding: 10px;
            font-family: 'Bungee';
            transform: rotate(-2deg);
            margin-bottom: 20px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        #open-btn {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>

    <!-- Overlay / Cover Undangan -->
    <div id="overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #0074BD 0%, #005C94 100%); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; transition: opacity 0.5s; cursor: pointer;">
        <h1 style="color: var(--roblox-red); font-family: 'Bungee'; font-size: 2rem; margin-bottom: 20px; text-shadow: 2px 2px 0 white;">UNDANGAN KHALID</h1>
        <p style="margin-bottom: 30px; font-weight: bold;">Ketuk layar di mana saja untuk membuka</p>
        <button id="open-btn" class="btn-play" style="border: none; cursor: pointer; margin-top: 0;">BUKA UNDANGAN 📩</button>
    </div>

    <div class="container">
        <div class="header-banner">JOIN THE GAME!</div>
        <div class="ramadan-tag">🌙 Ramadan Kareem</div>
        
        <img src="https://raw.githubusercontent.com/jihadsaputra17/undangan-ultah/main/azzamroblox.png" alt="Khalid" class="profile-pic">

        <h1>MUHAMMAD KHALID AZZAM</h1>
        <p class="subtitle" style="color: white; font-weight: bold;">LEVEL 7 UNLOCKED!</p>

        <div class="card">
            <p class="event-info">📅 Sabtu, 14 Maret 2026</p>
            <p>📍 Lokasi: Jl. Tanjungpura RT.25 NO.05</p>
            <hr style="border-color: #ddd;">
            <p>🕒 17.00 - 18.30: Perayaan Ultah 🎂</p>
            <p>🕒 18.30 - Selesai: Buka Bersama Keluarga 🍲</p>
        </div>

    </div>

    <!-- Elemen Audio untuk Musik Latar -->
    <audio id="background-music" loop>
        <!-- GANTI DENGAN LINK FILE MUSIK ANDA (misal: .mp3) -->
        <source src="https://raw.githubusercontent.com/jihadsaputra17/undangan-ultah/main/music.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Membuat animasi kotak-kotak terbang ala Roblox
        function createBalloon() {
            const b = document.createElement('div');
            b.className = 'balloon';
            b.style.left = Math.random() * 100 + 'vw';
            b.style.animationDuration = (Math.random() * 3 + 4) + 's';
            b.style.backgroundColor = ['#E2231A', '#00A2FF', '#FFFFFF', '#FFD700'][Math.floor(Math.random()*4)];
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 6000);
        }
        setInterval(createBalloon, 500);

        // Logika untuk membuka undangan dan memutar musik
        document.getElementById('overlay').addEventListener('click', function() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('overlay').style.display = 'none'; }, 500);
            
            const music = document.getElementById('background-music');
            music.play().catch(error => console.log("Playback failed: " + error));
        });
    </script>
</body>
</html>
